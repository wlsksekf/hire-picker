# [최종 설정] - HTTPS 적용 및 리버스 프록시

# 1. HTTP(80) -> HTTPS(443) 강제 리디렉션
server {
    listen 80;
    listen [::]:80;
    server_name hirepicker.duckdns.org; # 네 도메인

    # Certbot 갱신용 경로는 80번에 남겨둠 (중요)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지 모든 80 포트 요청은 443으로 보냄
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS(443) 서버 -> 실제 서비스
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hirepicker.duckdns.org; # 네 도메인

    # [SSL 인증서 경로]
    # Nginx 컨테이너 내부 경로(/etc/letsencrypt)를 적어야 함
    ssl_certificate /etc/letsencrypt/live/hirepicker.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hirepicker.duckdns.org/privkey.pem;

    # (보안 권장 설정)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # [기존 리버스 프록시 설정]
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # [추가] OAuth2 콜백을 백엔드로 전달
    location /login/oauth2/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie; # 쿠키 헤더 전달 추가
    }

    # [Swagger UI 프록시 설정] - API 문서 접근
    location /swagger-ui {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # [API Docs 프록시 설정] - OpenAPI JSON 문서 접근
    location /api-docs {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # [WebSocket 프록시 설정] - 채용공고 실시간 채팅
    location /ws {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400; # WebSocket 연결 유지 시간 (24시간)
    }
}
