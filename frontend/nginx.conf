# 리버스 프록시를 위한 Nginx 설정
# 80번 포트로 들어오는 요청을 Next.js 컨테이너로 전달

server {
    # 80번 포트에서 들어오는 모든 요청을 받음
    listen 80;
    listen [::]:80;
    
    server_name localhost; # 혹은 네 EC2 퍼블릭 IP

    location / {
        # ⭐️ 프론트엔드 컨테이너로 요청을 전달
        proxy_pass http://frontend:3000;
        
        # Next.js의 호스트 정보를 올바르게 전달
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /api/ 로 시작하는 모든 요청은...
    location /api/ {
        # 'backend' 서비스의 8080 포트로 전달!
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}