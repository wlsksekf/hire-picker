# /home/ubuntu/hirepicker/docker-compose.prod.yml

services:
  # 1. Nginx 리버스 프록시 (교통정리 담당)
  nginx:
    container_name: hirepicker-nginx
    image: nginx:1.23-alpine
    restart: on-failure
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - hirepicker-network

  # 2. 프론트엔드 (Next.js 동적 서버)
  frontend:
    container_name: hirepicker-frontend
    image: ${DOCKER_USERNAME}/${FRONTEND_IMAGE}:${GITHUB_SHA}
    restart: on-failure
    networks:
      - hirepicker-network

  # 3. 백엔드 (Spring Boot API 서버)
  backend:
    container_name: hirepicker-backend
    image: ${DOCKER_USERNAME}/${BACKEND_IMAGE}:${GITHUB_SHA}
    restart: on-failure
    security_opt:
      - seccomp:unconfined
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    # Health Check를 추가하여 서비스 안정성 확보
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - hirepicker-network

networks:
  hirepicker-network:
    driver: bridge