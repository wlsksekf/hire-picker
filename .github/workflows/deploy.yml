# .github/workflows/deploy.yml

name: HIREPICKER CI/CD

# 언제 이 워크플로우를 실행할지 정의
on:
  push:
    branches: ["dev"] # main 또는 dev 브랜치에 코드가 push 되면 실행

# 워크플로우 전체에서 사용할 변수 설정
env:
  DOCKER_USERNAME: jinaniyagi             # 본인 Docker Hub 사용자 이름
  BACKEND_IMAGE: hirepicker-backend       # Docker Hub에 저장될 백엔드 이미지 이름
  FRONTEND_IMAGE: hirepicker-frontend     # Docker Hub에 저장될 프론트엔드 이미지 이름

jobs:
  # ===================================================================
  #  Build Job: 소스코드를 빌드하여 Docker 이미지를 만들고 Docker Hub에 푸시
  # ===================================================================
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 깃허브 레포지토리의 코드를 Runner(가상머신)로 가져옴
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Docker Hub에 로그인 (Secrets에 저장된 정보 사용)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }} # DOCKER_TOKEN은 깃허브 Secret에 꼭 등록해야 함

      # 3. 백엔드 Docker 이미지 빌드 및 Docker Hub에 푸시
      # (backend/Dockerfile이 Multi-stage build로 구성되어 있어야 함)
      - name: Build and push Backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend  # 빌드할 소스코드가 있는 폴더
          file: ./backend/Dockerfile # 사용할 Dockerfile 경로
          push: true            # 빌드 후 Docker Hub에 푸시
          tags: ${{ env.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} # 이미지 태그

      # 4. 프론트엔드 Docker 이미지 빌드 및 Docker Hub에 푸시
      # (frontend/Dockerfile이 Multi-stage build로 구성되어 있어야 함)
      - name: Build and push Frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # ===================================================================
  #  Deploy Job: Build Job이 성공하면 EC2 서버에 배포
  # ===================================================================
  deploy:
    needs: build # build 작업이 성공적으로 끝나야만 이 deploy 작업을 실행
    runs-on: ubuntu-latest
    steps:
      # 1. (가장 먼저!) 레포지토리 파일들을 Runner로 가져옴
      # 이 단계가 scp보다 먼저 와야 "tar empty archive" 에러가 발생하지 않음
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 배포에 필요한 설정 파일들을 EC2 서버로 전송
      - name: Transfer config files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,nginx.conf" # 프로젝트 최상단 폴더에 파일들이 위치해야 함
          target: "/home/ubuntu/hirepicker"

      # 3. EC2 서버에 SSH로 접속해서 배포 스크립트 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: |
            # 작업 디렉토리로 이동
            cd /home/ubuntu/hirepicker

            # .env 파일 생성
            echo "DB_URL=${{ secrets.DB_URL }}" > .env
            echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DOCKER_USERNAME=${{ env.DOCKER_USERNAME }}" >> .env
            echo "BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}" >> .env
            echo "FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}" >> .env
            echo "GITHUB_SHA=${{ github.sha }}" >> .env

            # Docker Compose 실행
            docker-compose -f docker-compose.prod.yml --env-file ./.env pull
            docker-compose -f docker-compose.prod.yml --env-file ./.env up -d --remove-orphans
            
            # 컨테이너가 시작되거나 충돌할 시간을 잠시 줍니다 (15초).
            echo "Waiting for 15 seconds to check container status..."
            sleep 15

            # 모든 컨테이너의 현재 상태를 확인합니다.
            echo "--- Checking container status (docker-compose ps) ---"
            docker-compose -f docker-compose.prod.yml ps

            # 모든 컨테이너의 로그를 출력하여 오류를 확인합니다.
            echo "--- Displaying container logs (docker-compose logs) ---"
            docker-compose -f docker-compose.prod.yml logs