name: HIREPICKER CI/CD

on:
  push:
    branches: ["dev"]

env:
  DOCKER_USERNAME: jinaniyagi
  BACKEND_IMAGE: hirepicker-backend
  FRONTEND_IMAGE: hirepicker-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Secrets
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }} # 대문자로 수정
          AWS_SSH_PRIVATE_KEY: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: |
          echo "--- Verifying Secrets ---"
          if [ -n "$AWS_HOST" ]; then echo "✅ AWS_HOST is set."; else echo "❌ AWS_HOST is NOT set."; fi
          if [ -n "$AWS_USER" ]; then echo "✅ AWS_USER is set."; else echo "❌ AWS_USER is NOT set."; fi
          if [ -n "$AWS_SSH_PRIVATE_KEY" ]; then echo "✅ AWS_SSH_PRIVATE_KEY is set."; else echo "❌ AWS_SSH_PRIVATE_KEY is NOT set."; fi
          echo "🔑 DOCKER_TOKEN length: ${#DOCKER_TOKEN}"
          echo "-------------------------"

      - name: Transfer config files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }} # 대문자로 수정
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,nginx.conf"
          target: "/home/ubuntu/hirepicker"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          DOCKER_USERNAME: ${{ env.DOCKER_USERNAME }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }} # 대문자로 수정
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/hirepicker
            
            cat << EOF > .env
            DB_URL=${DB_URL}
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}
            DOCKER_USERNAME=${DOCKER_USERNAME}
            BACKEND_IMAGE=${BACKEND_IMAGE}
            FRONTEND_IMAGE=${FRONTEND_IMAGE}
            GITHUB_SHA=${GITHUB_SHA}
            EOF
            
            echo "${DOCKER_TOKEN}" | docker login -u "${DOCKER_USERNAME}" --password-stdin
            
            docker compose -f docker-compose.prod.yml --env-file ./.env pull
            docker compose -f docker-compose.prod.yml --env-file ./.env up -d --remove-orphans
            
            docker image prune -f