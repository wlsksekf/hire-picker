name: HIREPICKER CI/CD

on:
  push:
    branches: [ "dev" ] # dev 브랜치에 푸시될 때 실행

env:
  DOCKER_USERNAME: jinaniyagi
  BACKEND_IMAGE: hirepicker-backend
  FRONTEND_IMAGE: hirepicker-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ./backend/gradlew

      - name: Build with Gradle
        run: ./gradlew clean build
        working-directory: ./backend
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create directory on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: mkdir -p /home/ubuntu/hirepicker

      - name: Remove old nginx.conf directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: sudo rm -rf /home/ubuntu/hirepicker/nginx.conf

      - name: Transfer files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,frontend/nginx.conf"
          target: "/home/ubuntu/hirepicker"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/hirepicker

            # .env 파일 생성
            echo "DB_URL=${{ secrets.DB_URL }}" > .env
            echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DOCKER_USERNAME=${{ env.DOCKER_USERNAME }}" >> .env
            echo "BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}" >> .env
            echo "FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}" >> .env
            echo "GITHUB_SHA=${{ github.sha }}" >> .env

            # docker-compose.prod.yml 파일의 이름을 docker-compose.yml로 변경
            mv docker-compose.prod.yml docker-compose.yml

            # Docker Compose 실행
            docker compose --env-file ./.env down
            docker compose --env-file ./.env pull
            docker compose --env-file ./.env up -d
            docker image prune -f