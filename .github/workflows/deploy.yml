name: EUM-CAREER CI/CD

# dev 브랜치에 push 이벤트가 발생하면 이 워크플로우를 실행
on:
  push:
    branches: [ "dev" ]

# 워크플로우에서 사용할 환경 변수 설정
env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  BACKEND_IMAGE: eum-career-backend
  FRONTEND_IMAGE: eum-career-frontend

jobs:
  # 1. 빌드 잡: 코드를 빌드하고 Docker 이미지를 만들어 Docker Hub에 푸시
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # gradlew 파일에 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x ./backend/gradlew

      # 스프링 부트 애플리케이션 빌드 단계 추가
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        # ⭐️ 가장 안정적인 옵션으로 수정.
        run: ./gradlew clean build --args='--spring.profiles.active=test'
        working-directory: ./backend

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # 2. 배포 잡: EC2에 접속해서 최신 이미지를 받고 서비스를 실행
  deploy:
    needs: build # build 잡이 성공해야만 실행됨
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ⭐️ [최종 수정] docker-compose.yml 파일 전송
      - name: Transfer docker-compose file
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/eum-career"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: |
            # ⭐️ [최종 수정] 깃허브 환경 변수를 서버 환경 변수로 export
            export DOCKER_USERNAME=${{ env.DOCKER_USERNAME }}
            export BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}
            export FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}
            export GITHUB_SHA=${{ github.sha }}
            
            cd /home/ubuntu/eum-career

            # ⭐️ [최종 수정] .env 파일 생성
            echo "DB_URL=${{ secrets.DB_URL }}" > .env
            echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            
            # sed 명령은 더 이상 필요하지 않으므로 제거
            docker-compose pull
            docker-compose up -d
            docker image prune -f