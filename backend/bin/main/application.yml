# Git에 커밋하는 공용 설정 파일입니다.
# 실제 값 대신 변수를 사용합니다.

# 서버 포트 설정
server:
  port: 8080

# Spring Boot 프로필 설정 (기본으로 local 프로필을 활성화)
spring:
  profiles:
    active: local

# 데이터베이스 접속 정보 (깃허브 액션 환경 변수 또는 로컬 환경 변수에서 주입)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

# JPA 설정
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    defer-datasource-initialization: true

# CI/CD 환경에서 테스트를 위한 설정
  test:
    database:
      replace: none

# JWT (JSON Web Token) 시크릿 키
jwt:
  secret:
    key: ${JWT_SECRET_KEY}