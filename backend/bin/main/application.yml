# ===================================================================
#  공용 설정 (모든 환경에서 공통으로 사용)
# ===================================================================
server:
  port: 8081

spring:
  # 기본 프로필을 'local'으로 설정
  profiles:
    default: local

  # --- 데이터소스 공용 설정 ---
  datasource:
    # MySQL 드라이버 클래스 이름 명시
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # --- JPA 공용 설정 ---
  jpa:
    hibernate:
      ddl-auto: none
    # 💡 데이터베이스 종류를 명확히 알려줘서 오류 가능성을 줄임
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        # OSIV(Open Session In View)는 성능 저하의 원인이 될 수 있으므로 끄는 것을 권장
        open-in-view: false

# --- JWT 시크릿 키 설정 ---
jwt:
  secret-key: ${JWT_SECRET_KEY}

# --- Swagger(springdoc) API 문서 설정 ---
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
  paths-to-match:
    - /api/**
  version: v1.0.0
info:
  title: Hire-Picker API
  description: 구인구직 사이트 Hire-Picker 프로젝트 API 명세서
  version: v1.0.0

---
# ===================================================================
#  'local' 프로필 전용 설정 (개발용)
# ===================================================================
spring:
  config:
    activate:
      on-profile: "local"
  jpa:
    # 개발 중에는 SQL 로그를 확인하는 것이 편리
    properties:
      hibernate:
        show_sql: true
        format_sql: true

---
# ===================================================================
#  'prod' 프로필 전용 설정 (배포용)
# ===================================================================
spring:
  config:
    activate:
      on-profile: "prod"
  jpa:
    # 운영 환경에서는 성능을 위해 SQL 로그를 출력하지 않음
    properties:
      hibernate:
        show_sql: false
        format_sql: false