# ===================================================================
#  공용 설정 (모든 환경에서 사용)
# ===================================================================
server:
  port: 8080

spring:
  # 기본 프로필을 'local'으로 설정. 다른 프로필이 지정되면 무시됨.
  profiles:
    default: local

  # 공용 데이터소스 설정
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # 공용 JPA 설정
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true

# jwt:
#   secret:
#     key: ${JWT_SECRET_KEY}

---

# ===================================================================
#  'local' 프로필 전용 설정 (개발용)
# ===================================================================
spring:
  config:
    activate:
      on-profile: "local"
  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true

---

# ===================================================================
#  'prod' 프로필 전용 설정 (배포용)
# ===================================================================
spring:
  config:
    activate:
      on-profile: "prod"
  # 시스템 메트릭 관련 자동 설정을 제외하여 Cgroup 오류 및 애플리케이션 시작 실패 문제 해결
  autoconfigure:
    exclude: org.springframework.boot.actuate.autoconfigure.metrics.SystemMetricsAutoConfiguration
  # 운영 환경에서는 SQL 로그를 보지 않도록 설정
  jpa:
    properties:
      hibernate:
        format_sql: false
        show_sql: false