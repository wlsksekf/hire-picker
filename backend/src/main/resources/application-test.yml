# CI/CD 환경 테스트용 설정 파일
# 이 파일은 Git에 커밋해야 합니다.

spring:
  profiles: test
  
  # ⭐️ H2 인메모리 DB 설정
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  
  jpa:
    hibernate:
      ddl-auto: create
    database-platform: org.hibernate.dialect.H2Dialect