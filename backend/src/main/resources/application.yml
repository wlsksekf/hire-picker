# ===================================================================
#  공용 설정 (모든 환경에서 사용)
# ===================================================================

server:
  port: 8080
  address: 0.0.0.0

# === 데이터베이스(DB) 설정 ===
# [수정됨] H2 DB로 연결되는 문제를 해결하기 위해 RDS(MySQL) 설정을 명시적으로 추가
# .env 파일의 변수(${DB_URL} 등)를 참조함
spring:

  ai:
    vertex:
      ai:
        project-id: ${SPRING_AI_VERTEX_AI_PROJECT_ID}
        gemini:
          location: ${SPRING_AI_VERTEX_AI_GEMINI_LOCATION}
          chat:
            options:
              model: ${SPRING_AI_VERTEX_AI_GEMINI_CHAT_MODEL}
              temperature: 0.7 # 0.0(정확) ~ 1.0(창의적)
  # 기본 프로필을 'local'으로 설정. 다른 프로필이 지정되면 무시됨.
  profiles:
    default: local
  data:
    redis:
      host: localhost
      port: 6379

  # 공용 데이터소스 설정

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver # MySQL 드라이버
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      # DB 연결의 최대 수명 시간을 설정합니다. (단위: 밀리초, ms)
      max-lifetime: 20000000

  # === JPA 설정 ===
  jpa:
    # [수정됨] OSIV 경고(WARN) 해결: 성능 향상을 위해 false로 설정
    open-in-view: false
    hibernate:
      # 공통 ddl-auto는 여기서 관리 (prod에서 실수로 update/create 되는 것을 방지)
      ddl-auto: none
    properties:
      hibernate:
        # [추가됨] MySQL 8+ 버전 호환용 Dialect(방언) 설정
        dialect: org.hibernate.dialect.MySQLDialect

  # === Spring Security (OAuth2) ===
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET}
            scope:
              - profile
              - email
            redirect-uri: '{baseUrl}/login/oauth2/code/{registrationId}'

# === JWT 설정 ===
jwt:
  secret: ${JWT_SECRET}
  access-token-validity-in-seconds: 1800 # 30분
  refresh-token-validity-in-seconds: 2592000 # 30일

# ★ SendGrid API 키 설정 추가 (환경 변수에서 읽어옴)
sendgrid:
  api-key: ${SENDGRID_API_KEY}

# === Swagger (Springdoc) ===
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
  paths-to-match:
    - /api/**
  info: # New section
    version: v1.0.0

info:
  title: Hire-Picker API
  description: 구인구직 사이트 Hire-Picker 프로젝트 API 명세서
  version: v1.0.0

# === 로깅 설정 ===
logging:
  level:
    root: INFO
    org.springframework.security: INFO
    # [수정됨] CustomAuthenticationProvider 사용 시 발생하는 UserDetailsService 경고(WARN) 로그 끄기
    'org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer': ERROR

    # 디버깅을 위한 특정 패키지 로그 레벨 설정
    com.hirepicker.config.filter.JwtAuthenticationFilter: DEBUG
    com.hirepicker.config.security.CustomAuthenticationProvider: DEBUG
    com.hirepicker.service.UserDetailsServiceImpl: DEBUG
    com.hirepicker.controller.AuthController: DEBUG
    com.hirepicker.controller.UserController: DEBUG
    com.hirepicker.service.AuthService: DEBUG
    com.zaxxer.hikari: DEBUG


# === 외부 API 키 ===
# [추가됨] .env 파일의 API 키들을 Spring에서 쉽게 주입받아 사용하기 위한 설정
api:
  work24:
    key: ${work24_key}

payment:
  toss:
    widget-secret-key: ${TOSS_WIDGET_SECRET_KEY}
    api-secret-key: ${TOSS_API_SECRET_KEY}
    client-key: ${NEXT_PUBLIC_TOSS_CLIENT_KEY}
    api-url: "https://api.tosspayments.com"

management:
  endpoints:
    web:
      exposure:
        include: '*' # 모든 엔드포인트 노출 (개발용)
  endpoint:
    health:
      show-details: always # /health 엔드포인트에 세부 정보 표시


---
# ===================================================================
#  'local' 프로필 전용 설정 (개발용)
# ===================================================================
spring:
  config:
    activate:
      on-profile: 'local'
  jpa:
    hibernate:
      ddl-auto: none # local 환경에서는 엔티티 변경 시 DB 테이블 수동 관리 (기존 설정 유지)
    properties:
      hibernate:
        format_sql: true
        show_sql: true

---
# ===================================================================
#  'prod' 프로필 전용 설정 (배포용)
# ===================================================================
spring:
  config:
    activate:
      on-profile: 'prod'
  jpa:
    hibernate:
      ddl-auto: none # [수정됨] prod 환경에서도 ddl-auto는 none 또는 validate 권장
    properties:
      hibernate:
        format_sql: false
        show_sql: false

# 시스템 메트릭 바인더 비활성화 (기존 설정 유지)
management:
  metrics:
    binders:
      'system':
        enabled: false
