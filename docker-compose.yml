services:
  db:
    container_name: local-db
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: resume
    ports:
      - "3306:3306"
    networks:
      - local-network

  backend:
    container_name: local-backend
    build: ./backend
    restart: no
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - local-network
    # 로컬용 application.yml을 사용하도록 환경 변수 설정
    environment:
      - SPRING_PROFILES_ACTIVE=local

  frontend:
    container_name: local-frontend
    build: ./frontend
    restart: no
    networks:
      - local-network

  nginx:
    container_name: local-nginx
    image: nginx:1.23-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - local-network

networks:
  local-network:
    driver: bridge