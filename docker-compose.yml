# 통합 Docker Compose 파일
#
# 이 파일은 개발(dev) 및 프로덕션(prod) 환경 설정을 모두 포함합니다.
# Docker Compose 프로필(profile)을 사용하여 두 환경을 분리합니다.
#
# [사용법]
#   - 개발 환경 실행: docker-compose --profile dev up --build
#   - 프로덕션 환경 실행: docker-compose --profile prod up -d
#
# 참고: dev와 prod 프로필은 모두 80번 포트를 사용하므로, 동일한 머신에서 동시에 실행할 수 없습니다.
#
services:
  # =============================================
  #   프로필: dev (개발 환경)
  # =============================================
  redis-dev:
    container_name: local-redis
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    networks:
      - hirepicker-network
    profiles: ["dev"]

  backend-dev:
    container_name: local-backend
    build: ./backend
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - hirepicker-network
    profiles: ["dev"]
    depends_on:
      - redis-dev

  frontend-dev:
    container_name: local-frontend
    build: ./frontend
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - hirepicker-network
    profiles: ["dev"]

  nginx-dev:
    container_name: local-nginx
    image: nginx:1.23-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend-dev
      - backend-dev
    networks:
      - hirepicker-network
    profiles: ["dev"]

  # =============================================
  #   프로필: prod (프로덕션 환경)
  # =============================================
  redis:
    container_name: hirepicker-redis
    image: redis:7-alpine
    restart: on-failure
    networks:
      - hirepicker-network
    profiles: ["prod"]

  nginx:
    container_name: hirepicker-nginx
    image: nginx:1.23-alpine
    restart: on-failure
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - hirepicker-network
    profiles: ["prod"]

  frontend:
    container_name: hirepicker-frontend
    image: ${DOCKER_USERNAME}/${FRONTEND_IMAGE}:latest
    restart: on-failure
    logging: # 로그 로테이션 설정 추가
      driver: "json-file"
      options:
        max-size: "1m" # 로그 파일 최대 크기: 1MB
        max-file: "3"  # 최대 파일 개수: 3개
    networks:
      - hirepicker-network
    profiles: ["prod"]

  backend:
    container_name: hirepicker-backend
    image: ${DOCKER_USERNAME}/${BACKEND_IMAGE}:latest
    restart: on-failure
    security_opt:
      - seccomp:unconfined
    logging: # 로그 로테이션 설정 추가
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"
    env_file:
      - ./.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATA_REDIS_HOST: redis # Docker 네트워크 내에서 redis 서비스 이름으로 호스트를 찾음
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - hirepicker-network
    profiles: ["prod"]
    depends_on:
      - redis

networks:
  hirepicker-network:
    driver: bridge