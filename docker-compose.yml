version: '3.8'

services:
  # 백엔드 서비스
  backend:
    container_name: eum-career-backend
    # build 대신, GitHub Actions가 만든 이미지를 Docker Hub에서 가져옴
    image: ${DOCKER_USERNAME}/${BACKEND_IMAGE}:${GITHUB_SHA}
    restart: always
    # 포트 설정은 Nginx를 통해서만 통신하므로 제거. 외부 노출 불필요.
    # DB 접속 정보는 아래 .env 파일을 통해 주입됨
    environment:
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    networks:
      - eum-network

  # 프론트엔드 & Nginx 서비스
  # 프론트엔드 Dockerfile이 Nginx를 포함하므로 하나로 합쳐짐
  frontend:
    container_name: eum-career-frontend
    # build 대신, GitHub Actions가 만든 이미지를 Docker Hub에서 가져옴
    image: ${DOCKER_USERNAME}/${FRONTEND_IMAGE}:${GITHUB_SHA}
    restart: always
    ports:
      - "80:80" # 외부 요청을 받는 80번 포트만 개방
    depends_on:
      - backend # 백엔드가 먼저 실행되도록 보장
    networks:
      - eum-network

# 서비스 간 통신을 위한 내부 네트워크 정의
networks:
  eum-network:
    driver: bridge